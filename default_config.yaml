# 首次加载复制到 data/jmcomic/config.yaml；运行时只改 data 里那份即可

download_dir: data/jmcomic/download
pdf_dir: data/jmcomic/pdf
delete_original: true
reuse_existing_pdf: true
max_concurrent_downloads: 1

limits:
  preflight: true
  max_pages: 300
  max_episodes: 50
  max_pdf_mb: 50
  download_timeout_sec: 900
  pages_per_episode_estimate: 10

pdf_compress:
  enabled: true
  compress_at_download: true  # 拉取时每张图立刻降质，PDF 直接由小图合成
  jpeg_quality: 62            # 越低体积越小（建议 55–70，漫画可读）
  max_image_width: 1080       # 长边上限 px，超则缩放
  min_bytes: 262144
  min_savings_ratio: 0        # PDF 级 fallback 时：0=只要有缩小就替换
  optimize_cached: false      # 命中本地 PDF 不再重压，直接发送
  fallback_jpeg_quality: 52   # 仍超 limits.max_pdf_mb 时 PDF 级强压
  fallback_max_image_width: 900

client:
  impl: api
  proxy: ""

public_base_url: ""

qq:
  cache_max_files: 15

deploy:
  sync_qq_plugin_on_startup: true
  target_core: jm-Core
